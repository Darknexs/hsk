<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语星 – Học tiếng Trung HSK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
:root{
  /* ✦ Jade × Sakura × Sky — học chill, không nóng ✦ */
  --pk:#5EAD8F;
  --pk2:#3A8F72;
  --pk-l:#EDF8F3;
  --pk-m:#AEDECE;
  --bl:#7BAFD6;
  --bl2:#4F8EC0;
  --bl-l:#EBF3FB;
  --bl-m:#B5D4ED;
  --gn:#5EAD8F;
  --gn-l:#EDF8F3;
  --rd:#E05577;
  --rd-l:#FCEDF3;
  --yl:#F5BE45;
  --yl-l:#FEF8E0;
  --rose:#D4799C;
  --rose-l:#F9EBF3;
  --rose-m:#EDBED4;
  --ink:#192535;
  --ink2:#3A5068;
  --muted:#7D97AE;
  --bg:#F3F7F5;
  --white:#FFFFFF;
  --shadow:0 2px 16px rgba(58,143,114,.09),0 1px 4px rgba(58,143,114,.05);
  --shadow-lg:0 10px 40px rgba(58,143,114,.18);
  --r:16px;--r-sm:12px;--r-xs:8px;
  --font-cn:'Noto Sans SC',sans-serif;
  --font-ui:'Plus Jakarta Sans',sans-serif;
  --font-display:'Fraunces',serif;
  --font-mono:'Space Mono',monospace;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-ui);
  background-color:var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  background-image:
    radial-gradient(circle, rgba(94,173,143,.12) 1.4px, transparent 1.4px),
    radial-gradient(circle, rgba(212,121,156,.07) 1px, transparent 1px);
  background-size:30px 30px, 15px 15px;
  background-position:0 0, 7px 7px;
}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--pk-l)}
::-webkit-scrollbar-thumb{background:var(--pk-m);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--pk)}

/* ══ TOP NAVBAR ══ */
#app-header{
  background:var(--white);
  padding:0 28px;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  border-bottom:2px solid rgba(240,120,84,.18);
  box-shadow:0 2px 24px rgba(30,34,64,.07);
}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{font-size:24px;line-height:1;filter:drop-shadow(0 2px 4px rgba(212,132,154,.3))}
.logo-text{font-family:var(--font-cn);font-size:20px;font-weight:700;color:var(--ink);letter-spacing:2px}
.logo-sub{font-size:11px;color:var(--muted);font-family:var(--font-display);font-style:italic;letter-spacing:.5px}
.hsk-tabs{display:flex;gap:8px}
.hsk-tab{
  padding:8px 20px;border-radius:30px;border:2px solid var(--pk-m);
  background:var(--pk-l);color:var(--pk2);font-family:var(--font-ui);
  font-size:13px;font-weight:700;cursor:pointer;transition:all .25s;
}
.hsk-tab:hover{background:var(--pk-m);border-color:var(--pk);color:var(--pk2)}
.hsk-tab.active{
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  border-color:transparent;color:white;
  box-shadow:0 3px 14px rgba(212,132,154,.4);
}
.level-badge{
  font-size:11px;background:rgba(255,255,255,.25);
  padding:2px 7px;border-radius:10px;margin-left:4px;
}

/* ══ SECONDARY NAV ══ */
#sec-nav{
  background:var(--white);
  border-bottom:2px solid rgba(240,120,84,.18);
  display:flex;justify-content:center;gap:0;padding:0;
  position:sticky;top:68px;z-index:190;
  box-shadow:0 2px 12px rgba(30,34,64,.05);
}
.sec-btn{
  display:flex;align-items:center;gap:8px;padding:14px 36px;
  border:none;border-bottom:3px solid transparent;background:transparent;
  font-family:var(--font-ui);font-size:15px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:all .2s;
}
.sec-btn:hover{color:var(--pk);background:var(--pk-l)}
.sec-btn.active{color:var(--pk2);border-bottom-color:var(--pk);background:var(--pk-l)}

/* ══ CONTENT NAV ══ */
#content-nav{
  display:flex;justify-content:center;gap:10px;padding:22px 20px 0;background:transparent;
}
.content-btn{
  display:flex;align-items:center;gap:7px;padding:9px 22px;
  border-radius:30px;border:2px solid var(--bl-m);
  background:var(--white);font-family:var(--font-ui);
  font-size:14px;font-weight:700;color:var(--bl2);cursor:pointer;transition:all .22s;
  box-shadow:0 2px 8px rgba(143,184,152,.08);
}
.content-btn:hover{background:var(--bl-l);border-color:var(--bl)}
.content-btn.active{
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border-color:transparent;
  box-shadow:0 3px 14px rgba(212,132,154,.3);
}

/* ══ MAIN ══ */
main{max-width:1000px;margin:0 auto;padding:28px 16px 80px}

/* ══ PANELS ══ */
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══ DICTIONARY ══ */
.search-wrap{position:relative;margin-bottom:20px}
.search-input{
  width:100%;padding:14px 20px 14px 50px;
  border:2px solid var(--pk-m);border-radius:50px;
  font-family:var(--font-ui);font-size:15px;font-weight:600;
  background:var(--white);color:var(--ink);outline:none;transition:all .2s;
  box-shadow:0 2px 14px rgba(212,132,154,.08);
}
.search-input:focus{border-color:var(--pk);box-shadow:0 4px 22px rgba(212,132,154,.16)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.search-clear{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;border-radius:50%;border:none;background:var(--pk-m);
  color:white;font-size:16px;cursor:pointer;display:none;
  align-items:center;justify-content:center;transition:all .18s;
}
.search-clear:hover{background:var(--pk)}
.search-clear.show{display:flex}

.dict-meta{font-size:13px;color:var(--muted);font-family:var(--font-mono);margin-bottom:12px;padding:0 4px}

.dict-table{
  width:100%;background:var(--white);border-radius:var(--r);
  box-shadow:var(--shadow);overflow:hidden;border:2px solid var(--pk-m);
}
.dict-header{
  display:grid;grid-template-columns:100px 1fr;
  background:linear-gradient(135deg,#5EAD8F 0%,#3A8F72 100%);
  color:white;padding:14px 20px;font-size:13px;font-weight:700;letter-spacing:.5px;
}
.dict-body{max-height:65vh;overflow-y:auto}
.dict-row{
  display:grid;grid-template-columns:100px 1fr;
  border-bottom:1.5px solid var(--pk-l);cursor:pointer;transition:all .18s;
  align-items:center;padding:0;
}
.dict-row:last-child{border-bottom:none}
.dict-row:hover{background:var(--pk-l)}
.dict-row.selected{background:var(--pk-l);border-left:4px solid var(--pk)}

.char-cell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px;border-right:1.5px solid var(--pk-l);min-height:90px;
}
.hw-container{
  min-width:62px;max-width:240px;min-height:30px;max-height:70px;
  cursor:pointer;display:flex;justify-content:center;align-items:center;
}
.char-fallback{font-family:var(--font-cn);font-size:40px;font-weight:700;color:var(--ink);text-align:center;line-height:1}

.info-cell{padding:12px 16px 12px 12px;display:flex;flex-direction:column;gap:5px}
.info-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.info-pinyin{font-family:var(--font-mono);font-size:14px;color:var(--bl2);font-weight:700}
.info-meaning{font-size:14px;font-weight:700;color:var(--ink2)}
.info-example{
  font-family:var(--font-cn);font-size:13px;color:var(--ink2);
  line-height:1.5;padding:4px 10px;background:var(--pk-l);
  border-radius:8px;margin-top:2px;border-left:3px solid var(--pk-m);
}
.info-example-py{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.info-example-vi{font-size:12px;color:var(--muted)}
.tag-theme{
  font-size:10px;padding:2px 8px;border-radius:10px;
  background:var(--pk-m);color:var(--pk2);font-weight:700;white-space:nowrap;
}

.tts-btn{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--pk-m);
  background:var(--pk-l);color:var(--pk2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
  flex-shrink:0;margin-left:auto;
}
.tts-btn:hover{background:var(--pk);color:white;border-color:var(--pk)}
.tts-btn.speaking{animation:pulse .5s infinite alternate;background:var(--pk);color:white}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.15)}}

/* ══ FLASHCARD ══ */
.fc-filter{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.fc-filter-btn{
  padding:8px 16px;border-radius:30px;border:2px solid var(--pk-m);
  background:var(--white);font-size:13px;font-weight:700;
  color:var(--pk2);cursor:pointer;transition:all .18s;
}
.fc-filter-btn:hover{background:var(--pk-l)}
.fc-filter-btn.active{
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border-color:transparent;
}
.theme-select{
  padding:8px 14px;border-radius:30px;border:2px solid var(--pk-m);
  font-family:var(--font-ui);font-size:13px;font-weight:700;
  color:var(--pk2);background:var(--pk-l);cursor:pointer;outline:none;
}

.fc-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.fc-bar{flex:1;height:8px;border-radius:4px;background:var(--pk-m);overflow:hidden}
.fc-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,#AEDECE 0%,var(--pk) 55%,var(--bl2) 100%);
  transition:width .4s;
}
.fc-count{font-family:var(--font-mono);font-size:13px;color:var(--muted);white-space:nowrap}

.card-scene{
  perspective:1200px;height:320px;cursor:pointer;
  margin-bottom:24px;user-select:none;
}
.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
}
.card-scene.flipped .card-inner{transform:rotateY(180deg)}
.card-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;
}
.card-front{
  background:linear-gradient(145deg,#A8DDD0 0%,#5EAD8F 35%,#3A8F72 72%,#1E6A55 100%);
  color:white;
  box-shadow:0 10px 40px rgba(58,143,114,.38), inset 0 1px 0 rgba(255,255,255,.22);
  position:relative;
  overflow:hidden;
}
.card-front::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 75% 18%, rgba(212,121,156,.28) 0%, transparent 55%);
  pointer-events:none;
}
.card-back{
  background:var(--white);transform:rotateY(180deg);
  border:2px solid var(--pk-m);box-shadow:var(--shadow-lg);
}

.card-hw{
  min-width:110px;max-width:500px;min-height:40px;max-height:120px;
  margin-bottom:16px;display:flex;justify-content:center;align-items:center;
}
.card-char{
  font-family:var(--font-cn);font-size:72px;font-weight:900;color:white;
  line-height:1;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.2);
}
.card-tts{
  position:absolute;top:16px;right:16px;width:42px;height:42px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);
  color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .2s;z-index:2;
}
.card-tts:hover{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.6)}
.card-num{
  position:absolute;top:16px;left:16px;font-family:var(--font-mono);
  font-size:11px;color:rgba(255,255,255,.55);background:rgba(255,255,255,.15);
  padding:4px 10px;border-radius:20px;
}

.card-back-pinyin{font-family:var(--font-mono);font-size:20px;color:var(--bl2);font-weight:700;margin-bottom:6px}
.card-back-meaning{
  font-size:26px;font-weight:900;color:#C0608A;
  margin-bottom:10px;text-align:center;
  font-family:var(--font-display);
}
.card-back-example{
  font-family:var(--font-cn);font-size:16px;color:var(--ink2);
  text-align:center;line-height:1.6;margin-bottom:4px;
  background:var(--pk-l);padding:8px 16px;border-radius:12px;max-width:90%;
  border:1px solid var(--pk-m);
}
.card-back-ev{font-size:13px;color:var(--muted);text-align:center;margin-top:4px}
.card-hint{position:absolute;bottom:14px;font-size:11px;color:rgba(255,255,255,.45)}
.card-back .card-hint{color:var(--muted)}
.card-back-tts{
  position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;
  border:2px solid var(--pk-m);background:var(--pk-l);color:var(--pk2);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;
}
.card-back-tts:hover{background:var(--pk);color:white;border-color:var(--pk)}

.card-nav{display:flex;align-items:center;justify-content:center;gap:16px}
.nc{
  width:50px;height:50px;border-radius:50%;border:2px solid var(--pk-m);
  background:var(--white);cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:var(--pk);
  box-shadow:0 2px 10px rgba(212,132,154,.1);
}
.nc:hover{
  background:var(--pk);color:white;border-color:var(--pk);transform:scale(1.06);
}
.nc.flip-btn{
  width:64px;height:64px;font-size:26px;
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border:none;
  box-shadow:0 4px 20px rgba(212,132,154,.4);
}
.nc.flip-btn:hover{transform:scale(1.08)}

/* ══ QUIZ ══ */
.quiz-mode-select{
  display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;
  background:var(--white);padding:18px;border-radius:var(--r);
  box-shadow:var(--shadow);border:2px solid var(--pk-m);align-items:center;
}
.quiz-mode-select label{font-weight:700;font-size:14px;color:var(--ink2)}
.mode-opt{
  padding:8px 18px;border-radius:30px;border:2px solid var(--pk-m);
  background:var(--white);font-size:13px;font-weight:700;
  color:var(--pk2);cursor:pointer;transition:all .18s;
}
.mode-opt:hover{background:var(--pk-l)}
.mode-opt.active{
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border-color:transparent;
}
.theme-sel{
  padding:8px 14px;border-radius:30px;border:2px solid var(--pk-m);
  font-family:var(--font-ui);font-size:13px;font-weight:700;
  color:var(--pk2);background:var(--pk-l);cursor:pointer;outline:none;
}
.btn-start{
  padding:10px 28px;
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border:none;border-radius:30px;font-size:14px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 16px rgba(212,132,154,.35);transition:all .2s;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(212,132,154,.48)}

.quiz-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;flex-wrap:wrap;gap:12px;
}
.score-chips{display:flex;gap:10px}
.schip{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:20px;font-weight:700;font-size:14px;
}
.schip.ok{background:var(--gn-l);color:#2d8f3c}
.schip.no{background:var(--rd-l);color:var(--rd)}
.q-progress{height:8px;border-radius:4px;background:var(--pk-m);overflow:hidden;margin-bottom:26px}
.q-prog-fill{
  height:100%;
  background:linear-gradient(90deg,#AEDECE 0%,var(--pk) 60%,var(--bl) 100%);
  border-radius:4px;transition:width .4s;
}

.qcard{
  background:var(--white);border-radius:var(--r);padding:32px;margin-bottom:20px;
  box-shadow:var(--shadow);border:2px solid var(--pk-l);text-align:center;
}
.q-label{
  font-family:var(--font-mono);font-size:11px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--muted);margin-bottom:14px;
}
.q-cn{font-family:var(--font-cn);font-size:56px;font-weight:900;color:var(--ink);line-height:1;margin-bottom:8px}
.q-pinyin{font-family:var(--font-mono);font-size:16px;color:var(--bl2);margin-bottom:4px}
.q-vi{font-size:28px;font-weight:900;color:var(--pk2);margin-bottom:6px;font-family:var(--font-display)}
.q-mode-lbl{font-size:13px;color:var(--muted)}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.qopt{
  padding:16px;border-radius:14px;border:2px solid var(--pk-l);
  background:var(--white);font-size:15px;font-weight:700;cursor:pointer;
  text-align:left;display:flex;align-items:center;gap:10px;
  transition:all .18s;font-family:var(--font-cn);
}
.qopt:hover:not(:disabled){border-color:var(--pk);background:var(--pk-l);transform:translateY(-2px)}
.qopt .opt-lbl{
  width:28px;height:28px;border-radius:50%;background:var(--pk-l);
  color:var(--pk2);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;font-weight:700;flex-shrink:0;
}
.qopt.correct{border-color:var(--gn);background:var(--gn-l)}
.qopt.correct .opt-lbl{background:var(--gn);color:white}
.qopt.wrong{border-color:var(--rd);background:var(--rd-l)}
.qopt.wrong .opt-lbl{background:var(--rd);color:white}
.qfeedback{
  text-align:center;font-size:15px;font-weight:700;padding:13px;
  border-radius:12px;margin-bottom:16px;display:none;animation:popIn .3s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.qfeedback.good{background:var(--gn-l);color:#2d8f3c}
.qfeedback.bad{background:var(--rd-l);color:var(--rd)}
.btn-qnext{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;
  cursor:pointer;display:none;transition:opacity .2s;
}
.btn-qnext:hover{opacity:.88}
.result-box{
  text-align:center;padding:50px 40px;background:var(--white);
  border-radius:var(--r);box-shadow:var(--shadow);border:2px solid var(--pk-m);
  display:none;animation:fadeIn .4s ease;
}
.result-emoji{font-size:64px;margin-bottom:14px}
.result-title{
  font-size:28px;font-weight:700;margin-bottom:8px;
  font-family:var(--font-display);color:var(--pk2);font-style:italic;
}
.result-score{font-family:var(--font-mono);font-size:52px;font-weight:700;color:var(--pk);margin-bottom:6px}
.result-sub{color:var(--muted);font-size:16px;margin-bottom:24px}
.btn-retry{
  padding:14px 40px;
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border:none;border-radius:40px;font-size:16px;font-weight:800;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(212,132,154,.35);
}
.btn-retry:hover{transform:translateY(-2px)}

/* ══ DRAG & DROP ══ */
.dd-mode-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.dd-mode-btn{
  padding:9px 20px;border-radius:30px;border:2px solid var(--pk-m);
  background:var(--white);font-size:14px;font-weight:700;
  color:var(--pk2);cursor:pointer;transition:all .18s;
}
.dd-mode-btn:hover{background:var(--pk-l)}
.dd-mode-btn.active{
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border-color:transparent;
}

.ex-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.expill{
  width:36px;height:36px;border-radius:50%;border:2px solid var(--pk-m);
  background:var(--white);font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--pk2);transition:all .18s;
}
.expill:hover{background:var(--pk-l)}
.expill.active{
  background:var(--pk);color:white;border-color:transparent;
  box-shadow:0 3px 10px rgba(212,132,154,.3);
}
.expill.done{background:var(--gn-l);border-color:var(--gn);color:#2d8f3c}

.exbox{
  background:var(--white);border-radius:var(--r);
  border:2px solid var(--pk-l);box-shadow:var(--shadow);
  padding:28px;margin-bottom:20px;
}
.ex-sub{
  font-family:var(--font-mono);font-size:11px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--pk2);margin-bottom:18px;font-weight:700;
}
.bank-lbl{font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:8px}
.word-bank{
  display:flex;flex-wrap:wrap;gap:8px;background:var(--pk-l);
  border-radius:12px;padding:12px;min-height:50px;margin-bottom:22px;
  border:2px dashed var(--pk-m);
}
.wtk{
  padding:6px 16px;border-radius:20px;background:white;
  border:2px solid var(--pk-m);font-family:var(--font-cn);font-size:16px;font-weight:700;
  color:var(--ink);cursor:grab;user-select:none;transition:all .18s;
  box-shadow:0 2px 8px rgba(212,132,154,.1);
}
.wtk:hover{border-color:var(--pk);background:var(--pk-l);transform:translateY(-2px)}
.wtk.dragging{opacity:.35;cursor:grabbing}
.wtk.used{display:none}

.sent-list{display:flex;flex-direction:column;gap:14px}
.sent-row{display:flex;align-items:flex-start;gap:10px}
.sent-num{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:6px;
}
.sent-txt{font-family:var(--font-cn);font-size:17px;line-height:2;font-weight:500;flex:1}
.dropz{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:80px;height:36px;border-radius:8px;
  border:2px dashed var(--pk);background:var(--pk-l);
  padding:0 10px;font-family:var(--font-cn);font-size:16px;font-weight:700;
  color:var(--pk2);cursor:pointer;transition:all .18s;
  vertical-align:middle;margin:0 3px;
}
.dropz:empty::before{content:attr(data-ph);color:var(--muted);font-size:12px;font-weight:600;font-family:var(--font-ui)}
.dropz.over{background:var(--bl-l);border-color:var(--bl)}
.dropz.filled{background:var(--bl-l);border-color:var(--bl);color:var(--bl2);border-style:solid}
.dropz.correct{background:var(--gn-l);border-color:var(--gn);color:#2d8f3c;border-style:solid}
.dropz.wrong{background:var(--rd-l);border-color:var(--rd);color:var(--rd);border-style:solid}

/* ══ SENTENCE ORDER ══ */
.sortbox{
  background:var(--white);border-radius:var(--r);
  border:2px solid var(--pk-l);box-shadow:var(--shadow);
  padding:28px;margin-bottom:20px;
}
.sort-q{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}
.sort-num{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sort-info{flex:1}
.sort-vi{font-size:14px;color:var(--muted);margin-bottom:8px}
.sort-drop-area{
  display:flex;flex-wrap:wrap;gap:8px;min-height:52px;
  border:2.5px dashed var(--pk-m);border-radius:12px;
  padding:10px;background:var(--pk-l);margin-bottom:12px;
}
.sort-drop-area.over{border-color:var(--pk);background:rgba(212,132,154,.08)}
.sort-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:44px}
.sort-token{
  padding:7px 14px;border-radius:10px;background:white;
  border:2px solid var(--pk-m);font-family:var(--font-cn);font-size:16px;font-weight:700;
  color:var(--ink);cursor:grab;user-select:none;transition:all .18s;
  box-shadow:0 2px 6px rgba(212,132,154,.1);
}
.sort-token:hover{border-color:var(--pk);background:var(--pk-l);transform:translateY(-2px)}
.sort-token.placed{background:var(--bl-l);border-color:var(--bl);color:var(--bl2);cursor:pointer}
.sort-token.dragging{opacity:.4}

/* ══ ACTIONS ══ */
.ex-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn-check{
  padding:11px 24px;
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);
  color:white;border:none;border-radius:12px;font-size:14px;font-weight:800;
  cursor:pointer;transition:opacity .2s;
  box-shadow:0 3px 14px rgba(212,132,154,.28);
}
.btn-check:hover{opacity:.88}
.btn-reveal{
  padding:11px 20px;background:var(--white);color:var(--muted);
  border:2px solid var(--pk-m);border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-reveal:hover{color:var(--pk);border-color:var(--pk)}
.btn-next-ex{
  padding:11px 24px;background:var(--bl);color:white;border:none;
  border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;display:none;
}
.btn-next-ex:hover{background:var(--bl2)}
.ex-score{margin-top:12px;font-size:15px;font-weight:700;min-height:20px}
.ex-score.good{color:#2d8f3c}.ex-score.part{color:var(--bl2)}.ex-score.bad{color:var(--rd)}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
  background:linear-gradient(135deg,var(--pk) 0%,var(--pk2) 100%);color:white;
  padding:12px 28px;border-radius:30px;font-size:15px;font-weight:800;
  box-shadow:0 8px 32px rgba(181,105,125,.35);z-index:1000;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ══ MISC ══ */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:16px;font-weight:600}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;background:var(--pk-m);color:var(--pk2)}
.tag.bl{background:var(--bl-m);color:var(--bl2)}

@media(max-width:600px){
  #app-header{padding:0 12px;height:56px}
  .logo-text{font-size:16px}
  .hsk-tab{padding:6px 12px;font-size:12px}
  .sec-btn{padding:10px 16px;font-size:13px}
  .card-char{font-size:54px}
  .q-cn{font-size:42px}
  .q-opts{grid-template-columns:1fr}
  main{padding:16px 10px 60px}
  .dict-row{grid-template-columns:80px 1fr}
  .char-cell{padding:8px}
  .hw-container{min-width:58px;max-width:220px;min-height:28px;max-height:58px}
}
</style>

<body>

<!-- ═══ TOP NAVBAR ═══ -->
<header id="app-header">
  <div class="logo">
    <div class="logo-icon">🌟</div>
    <div>
      <div class="logo-text">汉语星</div>
      <div class="logo-sub">Học tiếng Trung HSK</div>
    </div>
  </div>
  <div class="hsk-tabs">
    <button class="hsk-tab active" onclick="switchLevel('HSK1',this)">HSK 1<span class="level-badge">149</span></button>
    <button class="hsk-tab" onclick="switchLevel('HSK2',this)">HSK 2<span class="level-badge">150</span></button>
    <button class="hsk-tab" onclick="switchLevel('HSK3',this)">HSK 3<span class="level-badge">295</span></button>
  </div>
</header>

<!-- ═══ SECONDARY NAV ═══ -->
<nav id="sec-nav">
  <button class="sec-btn active" onclick="switchSection('vocab',this)">📖 Từ vựng</button>
  <button class="sec-btn" onclick="switchSection('review',this)">🎯 Ôn tập</button>
</nav>

<!-- ═══ CONTENT NAV ═══ -->
<div id="content-nav">
  <button class="content-btn active" id="vocab-dict-btn" onclick="switchContent('vocab','dict',this)">🔤 Từ điển</button>
  <button class="content-btn" id="vocab-fc-btn" onclick="switchContent('vocab','fc',this)">🃏 Flashcard</button>
  <button class="content-btn hidden-review" id="review-quiz-btn" onclick="switchContent('review','quiz',this)" style="display:none">❓ Trắc nghiệm</button>
  <button class="content-btn hidden-review" id="review-fill-btn" onclick="switchContent('review','fill',this)" style="display:none">🔡 Điền từ</button>
  <button class="content-btn hidden-review" id="review-sort-btn" onclick="switchContent('review','sort',this)" style="display:none">📋 Sắp xếp câu</button>
</div>

<main>

<!-- ══ DICTIONARY PANEL ══ -->
<div id="panel-dict" class="panel active">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Tìm bằng chữ Hán, pinyin hoặc nghĩa..." oninput="handleSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div class="dict-meta" id="dict-meta">149 từ vựng · HSK 1</div>
  <div class="dict-table">
    <div class="dict-header">
      <div>Chữ Hán</div>
      <div>Thông tin</div>
    </div>
    <div class="dict-body" id="dict-body"></div>
  </div>
</div>

<!-- ══ FLASHCARD PANEL ══ -->
<div id="panel-fc" class="panel">
  <div class="fc-filter">
    <button class="fc-filter-btn active" id="fc-random-btn" onclick="setFcMode('random',this)">🔀 Ngẫu nhiên</button>
    <button class="fc-filter-btn" id="fc-alpha-btn" onclick="setFcMode('alpha',this)">🔤 A→Z (Pinyin)</button>
    <button class="fc-filter-btn" id="fc-theme-btn" onclick="setFcMode('theme',this)">🏷️ Chủ đề</button>
    <select class="theme-select" id="fc-theme-select" onchange="setFcTheme(this.value)" style="display:none">
      <option value="">— Chọn chủ đề —</option>
    </select>
  </div>
  <div class="fc-progress">
    <div class="fc-bar"><div class="fc-fill" id="fc-prog-fill" style="width:0%"></div></div>
    <div class="fc-count" id="fc-count">1 / 149</div>
  </div>
  <div class="card-scene" id="card-scene" onclick="flipCard()">
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="card-num" id="fc-num-badge">1</div>
        <button class="card-tts" onclick="event.stopPropagation();speakCurrentCard()" title="Nghe phát âm">🔊</button>

      </div>
      <div class="card-face card-back">

        <div class="card-back-meaning" id="fc-back-meaning"></div>
        <div class="card-back-example" id="fc-back-example"></div>
        <div class="card-back-ev" id="fc-back-ev"></div>
        <div class="card-hint">← → Chuyển thẻ</div>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button class="nc" onclick="prevCard()" title="Trước (←)">◀</button>
    <button class="nc flip-btn" onclick="flipCard()" title="Lật thẻ (Space)">↻</button>
    <button class="nc" onclick="nextCard()" title="Tiếp (→)">▶</button>
  </div>
</div>

<!-- ══ QUIZ PANEL ══ -->
<div id="panel-quiz" class="panel">
  <div class="quiz-mode-select" id="quiz-config">
    <label>Chế độ:</label>
    <button class="mode-opt active" id="qmode-cn2vi" onclick="setQMode('cn2vi',this)">🀄 Hán → Việt</button>
    <button class="mode-opt" id="qmode-vi2cn" onclick="setQMode('vi2cn',this)">🇻🇳 Việt → Hán</button>
    <label style="margin-left:8px">Chủ đề:</label>
    <select class="theme-sel" id="quiz-theme-sel">
      <option value="">Ngẫu nhiên</option>
    </select>
    <button class="btn-start" onclick="startQuiz()">▶ Bắt đầu</button>
  </div>
  <div id="quiz-game" style="display:none">
    <div class="quiz-topbar">
      <div class="score-chips">
        <div class="schip ok">✓ <span id="q-ok">0</span></div>
        <div class="schip no">✗ <span id="q-no">0</span></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:13px;color:var(--muted)" id="q-lbl">Câu 1 / 20</div>
    </div>
    <div class="q-progress"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
    <div class="qcard">
      <div class="q-label" id="q-label-top"></div>
      <div id="q-question"></div>
    </div>
    <div class="q-opts" id="q-opts"></div>
    <div class="qfeedback" id="q-feedback"></div>
    <button class="btn-qnext" id="btn-qnext" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>
  <div class="result-box" id="quiz-result">
    <div class="result-emoji" id="r-emoji"></div>
    <div class="result-title">Kết quả</div>
    <div class="result-score" id="r-score"></div>
    <div class="result-sub" id="r-sub"></div>
    <button class="btn-retry" onclick="startQuiz()">Chơi lại 🔄</button>
  </div>
</div>

<!-- ══ FILL PANEL ══ -->
<div id="panel-fill" class="panel">
  <div class="dd-mode-bar">
    <span style="font-weight:700;font-size:14px;color:var(--ink2);align-self:center">Chủ đề:</span>
    <select class="theme-sel" id="fill-theme-sel" onchange="buildFillExs()">
      <option value="">Ngẫu nhiên</option>
    </select>
    <button class="btn-start" onclick="buildFillExs()">🔀 Bài mới</button>
  </div>
  <div class="ex-nav" id="fill-nav"></div>
  <div id="fill-content"></div>
</div>

<!-- ══ SORT PANEL ══ -->
<div id="panel-sort" class="panel">
  <div class="dd-mode-bar">
    <span style="font-weight:700;font-size:14px;color:var(--ink2);align-self:center">Chủ đề:</span>
    <select class="theme-sel" id="sort-theme-sel" onchange="buildSortExs()">
      <option value="">Ngẫu nhiên</option>
    </select>
    <button class="btn-start" onclick="buildSortExs()">🔀 Câu mới</button>
  </div>
  <div id="sort-content"></div>
</div>

const shuffle=a=>[...a].sort(()=>Math.random()-.5);
const $ =id=>document.getElementById(id);
const getThemes=()=>[...new Set(curVocab.map(w=>w.t))].sort();

function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ════ LEVEL SWITCH ════
function switchLevel(level,btn){
  curLevel=level;
  curVocab=VOCAB[level];
  filteredVocab=[...curVocab];
  document.querySelectorAll('.hsk-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  populateThemeSelects();
  // Reset and re-render current panel
  if(curContent==='dict')renderDict();
  else if(curContent==='fc'){initFcCards();renderCard();}
  else if(curContent==='quiz'){resetQuiz();}
  else if(curContent==='fill'){buildFillExs();}
  else if(curContent==='sort'){buildSortExs();}
}

// ════ SECTION SWITCH ════
function switchSection(section,btn){
  curSection=section;
  document.querySelectorAll('.sec-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Show/hide content nav buttons
  const vocabBtns=['vocab-dict-btn','vocab-fc-btn'];
  const reviewBtns=['review-quiz-btn','review-fill-btn','review-sort-btn'];
  vocabBtns.forEach(id=>{const el=$(id);if(el)el.style.display=section==='vocab'?'':'none'});
  reviewBtns.forEach(id=>{const el=$(id);if(el)el.style.display=section==='review'?'':'none'});
  // Switch to default content
  if(section==='vocab'){
    switchContent('vocab','dict',$('vocab-dict-btn'));
  } else {
    switchContent('review','quiz',$('review-quiz-btn'));
  }
}

// ════ CONTENT SWITCH ════
function switchContent(section,content,btn){
  curContent=content;
  document.querySelectorAll('.content-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  $('panel-'+content)?.classList.add('active');
  // Init on first open
  if(content==='dict')renderDict();
  else if(content==='fc'&&!fcCards.length){initFcCards();renderCard();}
  else if(content==='fc'){}
  else if(content==='quiz')resetQuiz();
  else if(content==='fill')buildFillExs();
  else if(content==='sort')buildSortExs();
}

// ════ THEME SELECTS ════
function populateThemeSelects(){
  const themes=getThemes();
  ['fc-theme-select','quiz-theme-sel','fill-theme-sel','sort-theme-sel'].forEach(id=>{
    const sel=$(id);if(!sel)return;
    const current=sel.value;
    sel.innerHTML='<option value="">— Tất cả / Ngẫu nhiên —</option>';
    themes.forEach(t=>{
      const opt=document.createElement('option');
      opt.value=t;
      opt.textContent=(THEMES[t]||'')+ ' '+t;
      sel.appendChild(opt);
    });
    sel.value=current;
  });
}

// ════ DICTIONARY ════
let hwMap={};
function renderDict(vocab){
  vocab=vocab||filteredVocab;
  const body=$('dict-body');
  body.innerHTML='';
  hwMap={};
  $('dict-meta').textContent=vocab.length+' từ vựng · '+curLevel;
  vocab.forEach((w,i)=>{
    const row=document.createElement('div');
    row.className='dict-row';
    row.dataset.idx=i;
    // Char cell
    const charCell=document.createElement('div');
    charCell.className='char-cell';
    const hwDiv=document.createElement('div');
    hwDiv.className='hw-container';
    hwDiv.id='hw-'+i;
    // Fallback character text
    const charFb=document.createElement('div');
    charFb.className='char-fallback';
    charFb.textContent=w.h;
    charFb.id='charfb-'+i;
    charCell.appendChild(hwDiv);
    charCell.appendChild(charFb);
    // Info cell
    const infoCell=document.createElement('div');
    infoCell.className='info-cell';
    const topRow=document.createElement('div');
    topRow.className='info-top';
    const pinyin=document.createElement('span');pinyin.className='info-pinyin';pinyin.textContent=w.p;
    const meaning=document.createElement('span');meaning.className='info-meaning';meaning.textContent=w.m;
    const theme=document.createElement('span');theme.className='tag-theme';theme.textContent=(THEMES[w.t]||'')+ ' '+w.t;
    const ttsBtn=document.createElement('button');
    ttsBtn.className='tts-btn';ttsBtn.textContent='🔊';
    ttsBtn.title='Nghe phát âm';
    ttsBtn.onclick=e=>{e.stopPropagation();speakWord(w.h);};
    topRow.appendChild(pinyin);topRow.appendChild(meaning);topRow.appendChild(theme);topRow.appendChild(ttsBtn);
    infoCell.appendChild(topRow);
    if(w.ex){
      const ex=document.createElement('div');ex.className='info-example';
      ex.textContent=w.ex;infoCell.appendChild(ex);
      const ep=document.createElement('div');ep.className='info-example-py';ep.textContent=w.ep;infoCell.appendChild(ep);
      const ev=document.createElement('div');ev.className='info-example-vi';ev.textContent=w.ev;infoCell.appendChild(ev);
    }
    row.appendChild(charCell);row.appendChild(infoCell);
    row.onclick=()=>{
      if(selectedRow)selectedRow.classList.remove('selected');
      row.classList.add('selected');selectedRow=row;
      initHanziWriter(i,w.h);
    };
    body.appendChild(row);
  });
}

function initHanziWriter(idx,char){
  const container=$('hw-'+idx);
  if(!container)return;
  const fb=$('charfb-'+idx);
  if(hwMap[idx]){hwMap[idx].forEach(w=>w.animateCharacter());return;}
  // Support multi-character words by creating a writer per CJK character
  const chars=[...char].filter(c=>(c>='一'&&c<='鿿')||(c>='㐀'&&c<='䶿')||(c>='豈'&&c<='﫿'));
  if(!chars.length){if(fb)fb.style.display='block';return;}
  const n=chars.length;
  const size=n===1?62:n===2?48:n===3?38:30;
  container.innerHTML='';
  container.style.cssText='display:flex;flex-wrap:wrap;justify-content:center;align-items:center;width:'+(n===1?70:(size*n+6))+'px;height:'+size+'px;cursor:pointer';
  const writers=[];let loadedCount=0;
  chars.forEach((ch,ci)=>{
    const subId='hw-'+idx+'-'+ci;
    const subDiv=document.createElement('div');
    subDiv.id=subId;subDiv.style.cssText='width:'+size+'px;height:'+size+'px;flex-shrink:0';
    container.appendChild(subDiv);
    try{
      const w=HanziWriter.create(subId,ch,{
        width:size,height:size,padding:3,
        showCharacter:false,showOutline:true,
        strokeColor:'#3A8F72',outlineColor:'#AEDECE',
        strokeAnimationSpeed:1,delayBetweenStrokes:150,
        onLoadCharDataSuccess:()=>{
          if(fb)fb.style.display='none';
          loadedCount++;
          if(loadedCount===chars.length)writers.forEach(w=>w.animateCharacter());
        },
        onLoadCharDataError:()=>{if(fb)fb.style.display='block';}
      });
      writers.push(w);
    }catch(e){if(fb)fb.style.display='block';}
  });
  hwMap[idx]=writers;
}

function handleSearch(val){
  const q=val.trim().toLowerCase();
  $('search-clear').classList.toggle('show',!!q);
  if(!q){filteredVocab=[...curVocab];renderDict();return;}
  filteredVocab=curVocab.filter(w=>
    w.h.includes(val)||
    w.p.toLowerCase().includes(q)||
    w.m.toLowerCase().includes(q)
  );
  renderDict(filteredVocab);
}
function clearSearch(){
  $('search-input').value='';
  $('search-clear').classList.remove('show');
  filteredVocab=[...curVocab];renderDict();
}

// ════ FLASHCARD ════
let fcHwWriter=null;
function initFcCards(){
  let pool=[...curVocab];
  if(fcMode==='alpha')pool=[...curVocab].sort((a,b)=>a.p.localeCompare(b.p));
  else if(fcMode==='theme'&&fcTheme)pool=curVocab.filter(w=>w.t===fcTheme);
  else pool=shuffle(curVocab);
  if(!pool.length)pool=[...curVocab];
  fcCards=pool;fcIdx=0;fcFlipped=false;
}

function setFcMode(mode,btn){
  fcMode=mode;
  document.querySelectorAll('.fc-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const sel=$('fc-theme-select');
  sel.style.display=mode==='theme'?'inline-block':'none';
  initFcCards();renderCard();
}
function setFcTheme(val){fcTheme=val;initFcCards();renderCard();}

function renderCard(){
  if(!fcCards.length)return;
  const c=fcCards[fcIdx];
  fcFlipped=false;
  $('card-scene').classList.remove('flipped');
  $('fc-num-badge').textContent=(fcIdx+1);
  $('fc-pinyin-front').textContent=c.p;
  $('fc-back-pinyin').textContent=c.p;
  $('fc-back-meaning').textContent=c.m;
  $('fc-back-example').textContent=c.ex||'';
  $('fc-back-ev').textContent=c.ev||'';
  $('fc-count').textContent=(fcIdx+1)+' / '+fcCards.length;
  $('fc-prog-fill').style.width=((fcIdx+1)/fcCards.length*100)+'%';
  // HanziWriter on front — support multi-character words
  const hwFront=$('card-hw-front');
  hwFront.innerHTML='';
  $('fc-char').style.display='none';
  const chars=[...c.h].filter(ch=>(ch>='一'&&ch<='鿿')||(ch>='㐀'&&ch<='䶿')||(ch>='豈'&&ch<='﫿'));
  if(!chars.length){
    $('fc-char').textContent=c.h;$('fc-char').style.display='block';hwFront.style.display='none';
  }else{
    const n=chars.length;
    const size=n===1?110:n===2?80:n===3?62:n<=5?48:40;
    hwFront.style.cssText='display:flex;justify-content:center;align-items:center;width:'+(n===1?120:(size*n+4))+'px;height:'+size+'px;margin-bottom:16px';
    const fcWriters=[];let fcLoaded=0;
    chars.forEach((ch,ci)=>{
      const subId='card-hw-char-'+ci;
      const subDiv=document.createElement('div');
      subDiv.id=subId;subDiv.style.cssText='width:'+size+'px;height:'+size+'px;flex-shrink:0';
      hwFront.appendChild(subDiv);
      try{
        const w=HanziWriter.create(subId,ch,{
          width:size,height:size,padding:5,
          showCharacter:false,showOutline:true,
          strokeColor:'#FFFFFF',outlineColor:'rgba(255,255,255,0.22)',
          strokeAnimationSpeed:.8,delayBetweenStrokes:120,
          onLoadCharDataSuccess:()=>{
            $('fc-char').style.display='none';
            fcLoaded++;
            if(fcLoaded===chars.length)fcWriters.forEach(w=>w.animateCharacter());
          },
          onLoadCharDataError:()=>{$('fc-char').textContent=c.h;$('fc-char').style.display='block';hwFront.style.display='none';}
        });
        fcWriters.push(w);
      }catch(e){$('fc-char').textContent=c.h;$('fc-char').style.display='block';}
    });
    fcHwWriter={animateCharacter:()=>fcWriters.forEach(w=>w.animateCharacter())};
  }
}

function flipCard(){
  fcFlipped=!fcFlipped;
  $('card-scene').classList.toggle('flipped',fcFlipped);
  if(!fcFlipped&&fcHwWriter){
    setTimeout(()=>fcHwWriter.animateCharacter(),300);
  }
}
function nextCard(){
  fcIdx=(fcIdx+1)%fcCards.length;
  renderCard();
  if(fcIdx===0)showToast('🎉 Bạn đã xem hết! Tiếp tục nhé~');
}
function prevCard(){fcIdx=(fcIdx-1+fcCards.length)%fcCards.length;renderCard();}

document.addEventListener('keydown',e=>{
  const panel=$('panel-fc');
  if(!panel||!panel.classList.contains('active'))return;
  if(e.key==='ArrowRight')nextCard();
  else if(e.key==='ArrowLeft')prevCard();
  else if(e.key===' '){e.preventDefault();flipCard();}
});

// ════ TTS ════
function initVoices(){
  const voices=speechSynthesis.getVoices();
  if(voices.length)cachedVoice=pickVoice(voices);
}
function pickVoice(voices){
  const pref=['Google 普通话（中国大陆）','Microsoft Huihui - Chinese (Simplified, PRC)','Ting-Ting','Sin-ji','Google 中文（台灣）'];
  for(const n of pref){const v=voices.find(x=>x.name===n);if(v)return v;}
  return voices.find(v=>/zh/i.test(v.lang))||voices.find(v=>/cmn/i.test(v.lang))||null;
}
if('speechSynthesis' in window){
  initVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>{cachedVoice=pickVoice(speechSynthesis.getVoices());});
}
function setTtsAnim(on){
  isSpeaking=on;
  document.querySelectorAll('.tts-btn,.card-tts,.card-back-tts').forEach(b=>b.classList.toggle('speaking',on));
}
function speakWord(word){
  if(isSpeaking){speechSynthesis.cancel();clearInterval(resumeInt);setTtsAnim(false);return;}
  speechSynthesis.cancel();
  setTimeout(()=>{
    const v=cachedVoice||pickVoice(speechSynthesis.getVoices());
    if(v)cachedVoice=v;
    const u=new SpeechSynthesisUtterance(word);
    u.lang='zh-CN';u.rate=0.8;u.pitch=1;u.volume=1;
    if(v)u.voice=v;
    setTtsAnim(true);
    let started=false;
    resumeInt=setInterval(()=>{if(speechSynthesis.paused)speechSynthesis.resume();},100);
    const guard=setTimeout(()=>{if(!started){clearInterval(resumeInt);setTtsAnim(false);}},3000);
    u.onstart=()=>{started=true;clearTimeout(guard);};
    u.onend=()=>{clearTimeout(guard);clearInterval(resumeInt);setTtsAnim(false);};
    u.onerror=()=>{clearTimeout(guard);clearInterval(resumeInt);setTtsAnim(false);};
    speechSynthesis.speak(u);
    setTimeout(()=>{if(!started&&!speechSynthesis.speaking&&isSpeaking){clearTimeout(guard);clearInterval(resumeInt);setTtsAnim(false);}},500);
  },80);
}
function speakCurrentCard(){
  if(!fcCards.length)return;
  speakWord(fcCards[fcIdx].h);
}

// ════ QUIZ ════
function setQMode(mode,btn){
  qMode=mode;
  document.querySelectorAll('#quiz-config .mode-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function resetQuiz(){
  $('quiz-config').style.display='flex';
  $('quiz-game').style.display='none';
  $('quiz-result').style.display='none';
}
function startQuiz(){
  qTheme=$('quiz-theme-sel').value;
  let pool=qTheme?curVocab.filter(w=>w.t===qTheme):[...curVocab];
  if(pool.length<4)pool=[...curVocab];
  qPool=shuffle(pool).slice(0,Math.min(Q_COUNT,pool.length));
  qIdx=0;qOk=0;qNo=0;qAnswered=false;
  $('quiz-config').style.display='none';
  $('quiz-game').style.display='block';
  $('quiz-result').style.display='none';
  renderQuestion();
}
function renderQuestion(){
  if(qIdx>=qPool.length){showResult();return;}
  qAnswered=false;
  const q=qPool[qIdx];
  $('q-ok').textContent=qOk;$('q-no').textContent=qNo;
  $('q-lbl').textContent='Câu '+(qIdx+1)+' / '+qPool.length;
  $('q-prog').style.width=(qIdx/qPool.length*100)+'%';
  $('q-feedback').style.display='none';$('btn-qnext').style.display='none';
  // Build question display
  const qCard=$('q-question');qCard.innerHTML='';
  const lbl=$('q-label-top');
  if(qMode==='cn2vi'){
    lbl.textContent='Chữ Hán này có nghĩa là gì?';
    qCard.innerHTML=`<div class="q-cn">${q.h}</div><div class="q-pinyin">${q.p}</div>`;
  }else{
    lbl.textContent='Từ nào trong tiếng Trung có nghĩa:';
    qCard.innerHTML=`<div class="q-vi">${q.m}</div><div class="q-mode-lbl">(Chọn chữ Hán đúng)</div>`;
  }
  // Options - try to pick from same theme first
  let wrongPool=curVocab.filter(v=>v.h!==q.h);
  const sameTheme=wrongPool.filter(v=>v.t===q.t);
  let wrongs=shuffle(sameTheme.length>=3?sameTheme:wrongPool).slice(0,3);
  const opts=shuffle([q,...wrongs]);
  const labels=['A','B','C','D'];
  const optsDiv=$('q-opts');optsDiv.innerHTML='';
  opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='qopt';
    const lbl2=document.createElement('span');lbl2.className='opt-lbl';lbl2.textContent=labels[i];
    const txt=document.createElement('span');
    if(qMode==='cn2vi'){txt.textContent=o.m;}
    else{txt.style.fontFamily='var(--font-cn)';txt.style.fontSize='20px';txt.textContent=o.h;}
    btn.appendChild(lbl2);btn.appendChild(txt);
    btn.onclick=()=>pickAnswer(btn,o.h===q.h,qMode==='cn2vi'?q.m:q.h);
    optsDiv.appendChild(btn);
  });
}
function pickAnswer(btn,correct,correctAns){
  if(qAnswered)return;qAnswered=true;
  const fb=$('q-feedback');fb.style.display='block';
  if(correct){
    btn.classList.add('correct');qOk++;
    fb.className='qfeedback good';fb.textContent='✓ Chính xác! 🎉';
    showToast('🌟 Tuyệt vời!');
  }else{
    btn.classList.add('wrong');qNo++;
    fb.className='qfeedback bad';
    fb.textContent=`✗ Sai! Đáp án đúng: ${correctAns}`;
    document.querySelectorAll('.qopt').forEach(b=>{
      const txt=b.querySelector('span:last-child');
      if(txt&&txt.textContent===correctAns)b.classList.add('correct');
    });
  }
  document.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
  $('q-ok').textContent=qOk;$('q-no').textContent=qNo;
  $('btn-qnext').style.display='block';
}
function nextQuestion(){qIdx++;renderQuestion();}
function showResult(){
  $('quiz-game').style.display='none';
  $('quiz-result').style.display='block';
  const pct=Math.round(qOk/qPool.length*100);
  $('r-score').textContent=qOk+' / '+qPool.length;
  $('r-sub').textContent='Bạn trả lời đúng '+pct+'% câu hỏi.';
  $('r-emoji').textContent=pct>=90?'🏆':pct>=70?'⭐':pct>=50?'📚':'💪';
  if(pct>=80)showToast('🎉 Xuất sắc! Bạn học rất giỏi!');
}

// ════ FILL EXERCISES ════
let fillTouchTk=null, fillTouchClone=null, fillTouchExIdx=null;
function buildFillExs(){
  fillTheme=$('fill-theme-sel').value;
  let pool=fillTheme?curVocab.filter(w=>w.t===fillTheme&&w.ex):[...curVocab].filter(w=>w.ex);
  if(pool.length<5)pool=curVocab.filter(w=>w.ex);
  pool=shuffle(pool);
  fillExercises=[];
  const perEx=8;
  for(let i=0;i<6;i++){
    const sents=pool.slice(i*perEx,(i+1)*perEx);
    if(sents.length<3){fillExercises.push({sents:shuffle(pool).slice(0,perEx),checked:false});continue;}
    fillExercises.push({sents,checked:false});
  }
  buildFillNav();renderFillEx(0);
}
function buildFillNav(){
  const nav=$('fill-nav');nav.innerHTML='';
  fillExercises.forEach((_,i)=>{
    const p=document.createElement('button');
    p.className='expill'+(i===0?' active':'');
    p.id='fill-pill-'+i;p.textContent=i+1;
    p.onclick=()=>renderFillEx(i);
    nav.appendChild(p);
  });
}
function renderFillEx(idx){
  document.querySelectorAll('.expill').forEach((p,i)=>p.classList.toggle('active',i===idx));
  const ex=fillExercises[idx];
  const correctWords=ex.sents.map(s=>s.h);
  const distract=shuffle(curVocab.filter(v=>!correctWords.includes(v.h))).slice(0,3);
  const bank=shuffle([...correctWords,...distract.map(d=>d.h)]);
  const cont=$('fill-content');cont.innerHTML='';
  const box=document.createElement('div');box.className='exbox';box.id='fillbox-'+idx;
  const sub=document.createElement('div');sub.className='ex-sub';sub.textContent='Bài '+(idx+1)+' / 6 · Kéo chữ Hán vào chỗ trống';box.appendChild(sub);
  const bankLbl=document.createElement('div');bankLbl.className='bank-lbl';bankLbl.textContent='📦 Kéo từ vào chỗ trống:';box.appendChild(bankLbl);
  const bankDiv=document.createElement('div');bankDiv.className='word-bank';bankDiv.id='fillbank-'+idx;
  bank.forEach(w=>{
    const tk=document.createElement('div');
    tk.className='wtk';tk.textContent=w;tk.draggable=true;
    const tkId='filltk-'+idx+'-'+w.replace(/\s/g,'_');
    tk.id=tkId;tk.dataset.word=w;
    tk.addEventListener('dragstart',e=>{e.dataTransfer.setData('word',w);e.dataTransfer.setData('fromZone','');tk.classList.add('dragging');});
    tk.addEventListener('dragend',()=>tk.classList.remove('dragging'));
    bankDiv.appendChild(tk);
  });
  bankDiv.addEventListener('dragover',e=>e.preventDefault());
  bankDiv.addEventListener('drop',e=>{
    e.preventDefault();
    const fz=e.dataTransfer.getData('fromZone');
    if(fz){
      const z=document.getElementById(fz);
      if(z){returnFillToBank(idx,z.dataset.filled);z.dataset.filled='';z.textContent='';z.className='dropz';z.setAttribute('data-ph','thả vào đây');}
    }
  });
  box.appendChild(bankDiv);
  const list=document.createElement('div');list.className='sent-list';
  ex.sents.forEach((w,si)=>{
    const row=document.createElement('div');row.className='sent-row';
    const num=document.createElement('div');num.className='sent-num';num.textContent=si+1;row.appendChild(num);
    const txt=document.createElement('div');txt.className='sent-txt';
    // Build sentence with blank replacing the word
    const sentence=w.ex;
    const wordPos=sentence.indexOf(w.h);
    const zoneId='fillz-'+idx+'-'+si;
    const z=document.createElement('span');
    z.className='dropz';z.id=zoneId;z.dataset.ans=w.h;z.dataset.filled='';
    z.setAttribute('data-ph','?');
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('over');});
    z.addEventListener('dragleave',()=>z.classList.remove('over'));
    z.addEventListener('drop',e=>{
      e.preventDefault();z.classList.remove('over');
      const word=e.dataTransfer.getData('word');
      const fz=e.dataTransfer.getData('fromZone');
      fillDropIntoZone(z,word,fz,idx);
    });
    z.addEventListener('click',()=>{
      if(z.dataset.filled){returnFillToBank(idx,z.dataset.filled);z.dataset.filled='';z.textContent='';z.className='dropz';z.setAttribute('data-ph','?');}
    });
    if(wordPos>=0){
      txt.appendChild(document.createTextNode(sentence.substring(0,wordPos)));
      txt.appendChild(z);
      txt.appendChild(document.createTextNode(sentence.substring(wordPos+w.h.length)));
    }else{
      txt.appendChild(z);
      txt.appendChild(document.createTextNode(' '+sentence));
    }
    const ev=document.createElement('div');ev.style.cssText='font-size:12px;color:var(--muted);margin-top:4px';ev.textContent=w.ev;
    row.appendChild(txt);row.appendChild(ev);
    list.appendChild(row);
  });
  box.appendChild(list);
  const sc=document.createElement('div');sc.className='ex-score';sc.id='fill-sc-'+idx;box.appendChild(sc);
  const acts=document.createElement('div');acts.className='ex-actions';
  const bChk=document.createElement('button');bChk.className='btn-check';bChk.textContent='✓ Kiểm tra';bChk.onclick=()=>checkFill(idx);
  const bRvl=document.createElement('button');bRvl.className='btn-reveal';bRvl.textContent='👁 Đáp án';bRvl.onclick=()=>revealFill(idx);
  const bNxt=document.createElement('button');bNxt.className='btn-next-ex';bNxt.id='fill-nxt-'+idx;
  bNxt.textContent=idx<5?'Bài tiếp →':'🏁 Hoàn thành';
  if(idx<5)bNxt.onclick=()=>renderFillEx(idx+1);
  acts.appendChild(bChk);acts.appendChild(bRvl);acts.appendChild(bNxt);
  box.appendChild(acts);cont.appendChild(box);
}
function fillDropIntoZone(zone,word,fromZone,exIdx){
  if(zone.dataset.filled)returnFillToBank(exIdx,zone.dataset.filled);
  if(fromZone){const oz=document.getElementById(fromZone);if(oz){oz.dataset.filled='';oz.textContent='';oz.className='dropz';oz.setAttribute('data-ph','?');}}
  const tk=document.getElementById('filltk-'+exIdx+'-'+word.replace(/\s/g,'_'));
  if(tk)tk.classList.add('used');
  zone.dataset.filled=word;zone.textContent=word;zone.className='dropz filled';
}
function returnFillToBank(exIdx,word){
  const tk=document.getElementById('filltk-'+exIdx+'-'+word.replace(/\s/g,'_'));
  if(tk)tk.classList.remove('used');
}
function checkFill(idx){
  const ex=fillExercises[idx];let c=0;
  ex.sents.forEach((_,si)=>{
    const z=document.getElementById('fillz-'+idx+'-'+si);if(!z)return;
    if(z.dataset.filled===ex.sents[si].h){z.className='dropz correct';c++;}
    else z.className='dropz wrong';
  });
  const n=ex.sents.length;
  const sc=document.getElementById('fill-sc-'+idx);
  if(c===n){sc.className='ex-score good';sc.textContent='🎉 Hoàn hảo! '+c+'/'+n;showToast('🌟 Xuất sắc!');}
  else if(c>=n/2){sc.className='ex-score part';sc.textContent='👏 '+c+'/'+n+' đúng. Cố lên!';}
  else{sc.className='ex-score bad';sc.textContent='💪 '+c+'/'+n+' đúng. Thử lại nhé!';}
  const pill=document.getElementById('fill-pill-'+idx);if(pill)pill.classList.add('done');
  const nb=document.getElementById('fill-nxt-'+idx);if(nb)nb.style.display='inline-block';
}
function revealFill(idx){
  const ex=fillExercises[idx];
  ex.sents.forEach((w,si)=>{
    const z=document.getElementById('fillz-'+idx+'-'+si);if(!z)return;
    if(z.dataset.filled!==w.h){
      if(z.dataset.filled)returnFillToBank(idx,z.dataset.filled);
      const tk=document.getElementById('filltk-'+idx+'-'+w.h.replace(/\s/g,'_'));
      if(tk)tk.classList.add('used');
      z.dataset.filled=w.h;z.textContent=w.h;z.className='dropz correct';
    }
  });
  const sc=document.getElementById('fill-sc-'+idx);sc.className='ex-score part';sc.textContent='📖 Đã hiển thị đáp án.';
}

// ════ SENTENCE ORDERING ════
let sortData=[];
let draggedSortToken=null, draggedFromArea=null;
function buildSortExs(){
  const theme=$('sort-theme-sel').value;
  let pool=curVocab.filter(w=>w.segs&&w.segs.length>=3);
  if(theme)pool=pool.filter(w=>w.t===theme);
  if(pool.length<3)pool=curVocab.filter(w=>w.segs&&w.segs.length>=3);
  pool=shuffle(pool).slice(0,8);
  sortData=pool.map(w=>({
    ...w,
    shuffled:shuffle([...w.segs]),
    placed:[],
    checked:false
  }));
  renderSortExs();
}
function renderSortExs(){
  const cont=$('sort-content');cont.innerHTML='';
  if(!sortData.length){
    cont.innerHTML='<div class="empty-state"><div class="emoji">😅</div><p>Không đủ câu cho chủ đề này. Hãy chọn chủ đề khác!</p></div>';
    return;
  }
  sortData.forEach((q,qi)=>{
    const box=document.createElement('div');box.className='sortbox';
    const qDiv=document.createElement('div');qDiv.className='sort-q';
    const num=document.createElement('div');num.className='sort-num';num.textContent=qi+1;
    const info=document.createElement('div');info.className='sort-info';
    const vi=document.createElement('div');vi.className='sort-vi';vi.textContent='📌 '+q.ev;
    // Drop area (answer area)
    const dropArea=document.createElement('div');
    dropArea.className='sort-drop-area';dropArea.id='sortdrop-'+qi;
    dropArea.addEventListener('dragover',e=>{e.preventDefault();dropArea.classList.add('over');});
    dropArea.addEventListener('dragleave',()=>dropArea.classList.remove('over'));
    dropArea.addEventListener('drop',e=>{
      e.preventDefault();dropArea.classList.remove('over');
      if(draggedSortToken){
        const fromDrop=draggedSortToken.closest('.sort-drop-area');
        const fromBank=draggedSortToken.closest('.sort-bank');
        if(fromBank||fromDrop){
          dropArea.appendChild(draggedSortToken);
          draggedSortToken.classList.add('placed');
          draggedSortToken=null;
        }
      }
    });
    // Bank (shuffled tokens)
    const bank=document.createElement('div');bank.className='sort-bank';bank.id='sortbank-'+qi;
    bank.addEventListener('dragover',e=>e.preventDefault());
    bank.addEventListener('drop',e=>{
      e.preventDefault();
      if(draggedSortToken&&draggedSortToken.closest('.sort-drop-area')){
        bank.appendChild(draggedSortToken);
        draggedSortToken.classList.remove('placed');
        draggedSortToken=null;
      }
    });
    q.shuffled.forEach(tok=>{
      const t=createSortToken(tok,qi);
      bank.appendChild(t);
    });
    info.appendChild(vi);info.appendChild(dropArea);info.appendChild(bank);
    qDiv.appendChild(num);qDiv.appendChild(info);
    box.appendChild(qDiv);
    // Check result area
    const sc=document.createElement('div');sc.className='ex-score';sc.id='sort-sc-'+qi;box.appendChild(sc);
    // Actions
    const acts=document.createElement('div');acts.className='ex-actions';
    const bChk=document.createElement('button');bChk.className='btn-check';bChk.textContent='✓ Kiểm tra';
    bChk.onclick=()=>checkSort(qi,q.segs);
    const bRvl=document.createElement('button');bRvl.className='btn-reveal';bRvl.textContent='👁 Đáp án';
    bRvl.onclick=()=>revealSort(qi,q.segs,box);
    acts.appendChild(bChk);acts.appendChild(bRvl);box.appendChild(acts);
    cont.appendChild(box);
  });
}
function createSortToken(tok,qi){
  const t=document.createElement('div');
  t.className='sort-token';t.textContent=tok;t.draggable=true;t.dataset.token=tok;t.dataset.qi=qi;
  t.addEventListener('dragstart',e=>{draggedSortToken=t;t.classList.add('dragging');});
  t.addEventListener('dragend',()=>t.classList.remove('dragging'));
  // Touch
  t.addEventListener('click',()=>{
    const drop=document.getElementById('sortdrop-'+qi);
    const bank=document.getElementById('sortbank-'+qi);
    if(t.closest('.sort-drop-area')){bank.appendChild(t);t.classList.remove('placed');}
    else{drop.appendChild(t);t.classList.add('placed');}
  });
  return t;
}
function checkSort(qi,correct){
  const drop=document.getElementById('sortdrop-'+qi);
  const placed=[...drop.children].map(t=>t.dataset.token);
  const sc=document.getElementById('sort-sc-'+qi);
  // Compare as joined string
  const isCorrect=placed.join('')===correct.join('');
  if(isCorrect){
    sc.className='ex-score good';sc.textContent='🎉 Đúng rồi! Tuyệt vời!';
    [...drop.children].forEach(t=>t.style.cssText='background:var(--gn-l);border-color:var(--gn);color:#2d8f3c');
    showToast('🌟 Chính xác!');
  }else{
    sc.className='ex-score bad';sc.textContent='✗ Chưa đúng. Thứ tự câu: '+correct.join(' ');
    [...drop.children].forEach(t=>t.style.cssText='background:var(--rd-l);border-color:var(--rd);color:var(--rd)');
  }
}
function revealSort(qi,correct,box){
  const drop=document.getElementById('sortdrop-'+qi);
  const bank=document.getElementById('sortbank-'+qi);
  drop.innerHTML='';bank.innerHTML='';
  correct.forEach(tok=>{
    const t=createSortToken(tok,qi);
    t.classList.add('placed');t.style.cssText='background:var(--gn-l);border-color:var(--gn);color:#2d8f3c';
    drop.appendChild(t);
  });
  const sc=document.getElementById('sort-sc-'+qi);
  sc.className='ex-score part';sc.textContent='📖 Đáp án: '+correct.join(' ');
}

// Touch drag for fill
let tFillTk=null, tFillClone=null, tFillExIdx=null;
document.addEventListener('touchstart',e=>{
  const el=e.target.closest('.wtk,.sort-token');
  if(!el)return;
  if(el.classList.contains('wtk')){
    tFillTk=el;
    const parts=el.id.split('-');tFillExIdx=parseInt(parts[1]);
  }
  tFillClone=el.cloneNode(true);
  Object.assign(tFillClone.style,{position:'fixed',zIndex:9999,opacity:'0.85',pointerEvents:'none',
    background:'white',borderRadius:'20px',padding:'6px 16px',fontWeight:'700',
    fontFamily:'var(--font-cn)',fontSize:'16px',border:'2px solid var(--pk)'});
  document.body.appendChild(tFillClone);
  const t=e.touches[0];
  tFillClone.style.left=(t.clientX-50)+'px';tFillClone.style.top=(t.clientY-20)+'px';
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!tFillClone)return;e.preventDefault();
  const t=e.touches[0];
  tFillClone.style.left=(t.clientX-50)+'px';tFillClone.style.top=(t.clientY-20)+'px';
},{passive:false});
document.addEventListener('touchend',e=>{
  if(!tFillClone)return;
  document.body.removeChild(tFillClone);tFillClone=null;
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el&&el.classList.contains('dropz')&&tFillTk){
    fillDropIntoZone(el,tFillTk.dataset.word,'',tFillExIdx);
  } else if(el&&el.classList.contains('sort-drop-area')&&tFillTk) {
    // handled by click
  }
  tFillTk=null;
},{passive:true});

// ════ INIT ════
function init(){
  curVocab=VOCAB.HSK1;filteredVocab=[...curVocab];
  populateThemeSelects();
  renderDict();
}
init();
